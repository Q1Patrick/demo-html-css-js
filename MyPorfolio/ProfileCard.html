<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="ProfileCard.css">
    <!-- Google Font -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">
    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
</head>
<body>
    <div class="main">
        <div class="profile-card">
            <!-- Profile Image -->
            <div class="image">
                <img src="PhatChau.jpg" alt="Chau Thanh Phat" class="profile-pic">
            </div>
            <!-- User Data -->
            <div class="data">
                <h2>Châu Thành Phát</h2>
                <span>Frontend Developer</span>
            </div>
            <!-- Statistics -->
            <div class="row">
                <div class="info">
                    <h3>2</h3>
                    <span>Projects</span>
                </div>

                <div class="info">
                    <h3>1</h3>
                    <span>Followers</span>
                </div>

                <div class="info">
                    <h3>10</h3>
                    <span>Posts</span>
                </div>
            </div>
            <!-- Buttons -->
            <div class="buttons">
                <a href="#" class="btn">Hire Me</a>
                <a href="#"class="btn">Portfolio</a>
            </div>
        </div>
    </div>
</body>
</html>
