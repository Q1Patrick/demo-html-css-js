<!DOCTYPE html>
<html>
    <head>
        <title>My first website</title>
    </head>
    <body>
        <form action="#" method="post">
        <div>
        <label for="fname">First Name:</label>
        <input type="text" name="fname" id="fname">
        </div>

        <br>
        <div>
            <label for="lname">Last Name:</label>
            <input type="text" name="lname" id="lname">
        </div>
        
        <br>
        <div>
            <label for="phone">Phone number:</label>
            <input type="text" name="phone" id="phone" maxlength="10" placeholder="(123)-456-7890"  required>
        </div>

        <br>
        <div>
            <label for="sex">Sex:</label>
            
            <label for="male">Male</label>
            <input type="radio" name="sex" id="male">

            <label for="fmale">Female</label>
            <input type="radio" name="sex" id="fmale">

            <label for="other">Other</label>
            <input type="radio" name="sex" id="other">
        </div>

        <br>
        <div>
            <label for="paymentCard">Payment:</label>
            <select name="paymentCard" id="paymentCard">
                <option value="Visa">Visa</option>
                <option value="MasterCard">Master Card</option>
                <option value="Cash">Cash</option>
            </select>
        </div>

        <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
